worker_processes auto;
events { worker_connections 1024; }

http {
    upstream depth_api {
        server depth-api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 25M;          # matches MAX_UPLOAD_MB + headroom
        proxy_read_timeout   120s;
        proxy_send_timeout   120s;

        location /api/ {
            proxy_pass         http://depth_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /docs { proxy_pass http://depth_api; }
        location /redoc { proxy_pass http://depth_api; }
        location /openapi.json { proxy_pass http://depth_api; }

        location /health {
            proxy_pass http://depth_api/api/v1/health;
        }
    }
}
